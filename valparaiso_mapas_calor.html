<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapas de Calor - Candidatos Valparaíso</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Layout Principal */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Panel Lateral Mejorado */
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            z-index: 1000; /* Muy alto para estar siempre sobre el mapa */
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-header h2 { margin: 0 0 10px 0; font-size: 1.4rem; }
        .sidebar-header p { margin: 0; font-size: 0.9rem; opacity: 0.8; }

        .candidate-selector {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        .candidate-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .candidate-btn:hover { background: #f0f0f0; border-color: #bbb; }
        
        .candidate-btn.active {
            border-color: #2c3e50;
            background: #eef2f5;
            transform: translateX(5px);
        }

        .candidate-party {
            display: block;
            font-size: 0.75rem;
            font-weight: normal;
            color: #666;
            margin-top: 2px;
        }

        /* Área de Estadísticas */
        #stats-area {
            padding: 20px;
            flex-grow: 1;
        }

        .uv-info {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .uv-title { font-size: 1.1rem; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .uv-subtitle { font-size: 0.85rem; color: #7f8c8d; margin-bottom: 15px; }

        .results-list { list-style: none; padding: 0; margin: 0; }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .result-item:last-child { border-bottom: none; }
        
        .cand-name { font-size: 0.9rem; font-weight: 500; }
        .cand-pct { font-weight: bold; font-size: 0.95rem; }
        
        .winner-badge {
            background: #27ae60;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 5px;
            text-transform: uppercase;
        }

        /* Leyenda Visual */
        .legend-box {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .legend-title { font-weight: bold; margin-bottom: 8px; display: block; }
        .gradient-bar {
            height: 10px;
            background: linear-gradient(to right, rgba(235, 235, 235, 0.2), rgba(44, 62, 80, 1));
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .legend-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #666; }

        /* Botón Volver */
        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #c0392b; }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                height: auto;
                max-height: 45vh;
                bottom: 0;
                top: auto;
                box-shadow: 0 -2px 15px rgba(0,0,0,0.2);
            }
            .candidate-selector { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; }
            .candidate-btn { min-width: 140px; margin-bottom: 0; }
        }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Mapas de Calor</h2>
            <p>Resultados por Unidad Vecinal</p>
        </div>

        <div class="candidate-selector">
            <!-- Se llena dinámicamente -->
        </div>

        <div id="stats-area">
            <div class="uv-info" id="uv-detail" style="display:none;">
                <div class="uv-title" id="detail-uv-name">UV Nombre</div>
                <div class="uv-subtitle" id="detail-uv-code">Código: ---</div>
                <ul class="results-list" id="detail-results"></ul>
            </div>

            <div class="legend-box">
                <span class="legend-title">Intensidad del Color</span>
                <div class="gradient-bar"></div>
                <div class="legend-labels">
                    <span>0%</span>
                    <span>Alto %</span>
                </div>
                <p style="margin-top:10px; font-size:0.8rem; color:#555;">
                    * El color representa el porcentaje de votos obtenido por el candidato seleccionado en esa unidad vecinal.
                </p>
            </div>

            <div style="text-align: center;">
                <a href="index.html" class="back-btn">← Volver al Inicio</a>
            </div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script>
    // Configuración Inicial
    let map;
    let geojsonLayer;
    let currentCandidate = null;
    let candidatesData = [];
    let uvData = {}; // Mapa de datos por UV

    // Colores base para los candidatos (para identificarlos en listas)
    const candidateColors = {
        'Luis Cuello': '#e74c3c', // Rojo
        'Jorge Sharp': '#f39c12', // Naranja
        'Jorge Brito': '#27ae60', // Verde
        'Juan Manuel Valenzuela': '#3498db' // Azul
    };

    // Inicializar Mapa
    function initMap() {
        map = L.map('map').setView([-33.047, -71.612], 13); // Centro Valparaíso

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
    }

    // Cargar Datos
    async function loadData() {
        try {
            // Cargar resultados
            const response = await fetch('data/datos_candidatos.json');
            const data = await response.json();
            
            // Procesar datos para facilitar búsqueda
            // Asumimos estructura: [{ uv: "1", codigo_uv": "...", "Luis Cuello": 15, "Jorge Sharp": 10... }, ...]
            // O estructura anidada. Ajustaremos según lo que cargue realmente.
            
            // Normalización de datos
            data.forEach(uv => {
                const key = uv.codigo_uv || uv.uv; // Usar código o nombre como key
                uvData[key] = uv;
            });

            // Extraer lista única de candidatos (excluyendo campos técnicos)
            const excludeKeys = ['uv', 'codigo_uv', 'nombre_uv', 'distrito', 'comuna'];
            if (data.length > 0) {
                const firstRow = data[0];
                candidatesData = Object.keys(firstRow).filter(k => !excludeKeys.includes(k));
            }

            renderCandidateSelector();
            loadGeoJSON();

        } catch (error) {
            console.error("Error cargando datos:", error);
            document.querySelector('.candidate-selector').innerHTML = '<p style="padding:15px; color:red;">Error al cargar datos. Verifique la consola.</p>';
        }
    }

    // Renderizar Botones de Candidatos
    function renderCandidateSelector() {
        const container = document.querySelector('.candidate-selector');
        container.innerHTML = '';

        candidatesData.forEach(cand => {
            const btn = document.createElement('button');
            btn.className = 'candidate-btn';
            btn.innerHTML = `${cand} <span class="candidate-party">Ver mapa de calor</span>`;
            btn.onclick = () => selectCandidate(cand, btn);
            container.appendChild(btn);
        });

        // Seleccionar el primero por defecto
        if (candidatesData.length > 0) {
            selectCandidate(candidatesData[0], container.firstChild);
        }
    }

    // Seleccionar Candidato
    function selectCandidate(candName, btnElement) {
        currentCandidate = candName;

        // Actualizar UI botones
        document.querySelectorAll('.candidate-btn').forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        // Actualizar Mapa
        updateMapColors();
        
        // Resetear panel lateral si hay una UV seleccionada
        const selectedUV = document.getElementById('uv-detail');
        if (selectedUV.style.display === 'block') {
            // Recalcular datos para la UV actualmente visible con el nuevo candidato
            // (La lógica de click en polígono se encarga de esto, pero forzamos refresh si es necesario)
        } else {
            document.getElementById('detail-uv-name').innerText = "Selecciona una unidad en el mapa";
            document.getElementById('detail-uv-code').innerText = "";
            document.getElementById('detail-results').innerHTML = "";
        }
    }

    // Cargar GeoJSON
    async function loadGeoJSON() {
        try {
            const response = await fetch('data/uv_valparaiso.geojson');
            const geojson = await response.json();

            geojsonLayer = L.geoJSON(geojson, {
                style: styleFeature,
                onEachFeature: onEachFeature
            }).addTo(map);

            // Ajustar vista
            map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });

        } catch (error) {
            console.error("Error cargando GeoJSON:", error);
        }
    }

    // Estilo Dinámico según Candidato
    function styleFeature(feature) {
        const uvCode = feature.properties.codigo_uv || feature.properties.name; // Ajustar según propiedad real
        const data = uvData[uvCode];
        
        let value = 0;
        if (data && currentCandidate && data[currentCandidate] !== undefined) {
            value = parseFloat(data[currentCandidate]);
        }

        // Lógica de Color Mejorada
        // Opacidad base baja, sube con el porcentaje
        // Color base del candidato actual
        
        let opacity = 0.1; // Base muy suave
        let color = '#999'; // Gris por defecto si no hay dato

        if (currentCandidate && value > 0) {
            // Asignar color del candidato
            color = candidateColors[currentCandidate] || '#3498db';
            
            // Escala de opacidad no lineal para resaltar diferencias
            if (value < 2) opacity = 0.15;
            else if (value < 5) opacity = 0.35;
            else if (value < 10) opacity = 0.6;
            else if (value < 15) opacity = 0.8;
            else opacity = 0.95; // Máxima intensidad
        }

        return {
            fillColor: color,
            weight: 1,
            opacity: 1,
            color: 'white', // Borde blanco para separar UVs
            dashArray: '',
            fillOpacity: opacity
        };
    }

    // Interacción con Features
    function onEachFeature(feature, layer) {
        layer.on({
            mouseover: highlightFeature,
            mouseout: resetHighlight,
            click: zoomToFeature
        });
    }

    function highlightFeature(e) {
        const layer = e.target;
        layer.setStyle({
            weight: 3,
            color: '#333',
            dashArray: '',
            fillOpacity: 0.9 // Aumentar opacidad al pasar el mouse
        });
        layer.bringToFront();
    }

    function resetHighlight(e) {
        geojsonLayer.resetStyle(e.target);
    }

    function zoomToFeature(e) {
        const layer = e.target;
        const properties = layer.feature.properties;
        
        // Zoom suave
        map.fitBounds(layer.getBounds(), { padding: [50, 50], maxZoom: 16 });

        showStats(properties);
    }

    // Mostrar Estadísticas en Panel
    function showStats(props) {
        const uvCode = props.codigo_uv || props.name;
        const data = uvData[uvCode];
        const detailPanel = document.getElementById('uv-detail');
        
        if (!data) {
            detailPanel.style.display = 'none';
            return;
        }

        detailPanel.style.display = 'block';
        document.getElementById('detail-uv-name').innerText = props.nombre_uv || props.name || "Unidad Vecinal";
        document.getElementById('detail-uv-code').innerText = `Código: ${uvCode}`;

        const list = document.getElementById('detail-results');
        list.innerHTML = '';

        // Ordenar candidatos por votos en esta UV
        const results = candidatesData.map(cand => {
            return {
                name: cand,
                votes: parseFloat(data[cand]) || 0
            };
        }).sort((a, b) => b.votes - a.votes);

        results.forEach((res, index) => {
            const li = document.createElement('li');
            li.className = 'result-item';
            
            const isWinner = index === 0;
            const winnerBadge = isWinner ? '<span class="winner-badge">Ganador</span>' : '';
            const colorDot = `<span style="display:inline-block;width:10px;height:10px;background:${candidateColors[res.name]||'#ccc'};border-radius:50%;margin-right:8px;"></span>`;

            li.innerHTML = `
                <div style="display:flex;align-items:center;">${colorDot}<span class="cand-name">${res.name} ${winnerBadge}</span></div>
                <span class="cand-pct" style="color:${isWinner ? '#27ae60' : '#333'}">${res.votes.toFixed(2)}%</span>
            `;
            list.appendChild(li);
        });
    }

    // Actualizar colores del mapa (cuando cambia candidato)
    function updateMapColors() {
        if (geojsonLayer) {
            geojsonLayer.eachLayer(function(layer) {
                geojsonLayer.resetStyle(layer);
                // Re-aplicar estilo con nueva lógica
                layer.setStyle(styleFeature(layer.feature));
            });
        }
    }

    // Iniciar
    initMap();
    loadData();

</script>
</body>
</html>
